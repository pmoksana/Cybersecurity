    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* Databricks Core Design Tokens */
        :root {
            --db-canvas: #1B3139;      
            --db-lava: #FF3621;        
            --db-oat-light: #F9F7F4;   
            --db-oat-medium: #EEEDE9;  
            --db-card: #FFFFFF;        
            --db-border: #DCE0E2;      
            --db-text-main: #303F47;   
            --db-text-muted: #5A6F77;  
            --db-accent-pink: #FF9E94; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--db-oat-light);
            color: var(--db-text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--db-canvas);
            color: #FFFFFF;
            border-bottom: 4px solid var(--db-lava);
            padding: 1.25rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-tag {
            background-color: var(--db-lava);
            color: #FFFFFF;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .brand-name {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand-name span {
            color: var(--db-accent-pink);
        }

        .main-wrapper {
            max-width: 1200px;
            width: 100%;
            margin: 3rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 3rem;
        }

        @media (max-width: 900px) {
            .main-wrapper { grid-template-columns: 1fr; gap: 2rem; }
        }

        /* Sidebar Design Configuration */
        aside {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .directory-card {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 4px 12px rgba(27, 49, 57, 0.02);
        }

        .directory-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--db-text-muted);
            margin-bottom: 1rem;
            font-weight: 700;
            border-bottom: 2px solid var(--db-oat-medium);
            padding-bottom: 0.5rem;
        }

        .directory-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .directory-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--db-canvas);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .directory-link:hover, .directory-link.active {
            background-color: var(--db-oat-medium);
            color: var(--db-lava);
        }

        .terminal-panel {
            background-color: var(--db-canvas);
            border: 1px solid #2C434C;
            border-radius: 12px;
            color: #E6EEF0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 1.25rem;
        }

        .terminal-cmd { color: var(--db-accent-pink); }

        /* Workspace Design Elements */
        .content-workspace {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .welcome-lead {
            font-size: 1.05rem;
            color: var(--db-text-muted);
            line-height: 1.6;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--db-border);
            padding-bottom: 1rem;
            margin-bottom: 0.5rem;
            gap: 1rem;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--db-canvas);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1.4rem;
            background-color: var(--db-lava);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .nav-actions-group { display: flex; gap: 0.5rem; }

        .back-btn {
            background-color: var(--db-canvas);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .back-btn:hover { background-color: var(--db-lava); }

        .open-file-btn {
            background-color: var(--db-lava);
            color: #FFFFFF;
            border: none;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.15s ease;
            text-transform: uppercase;
        }

        .open-file-btn:hover { background-color: var(--db-canvas); }

        /* Folder Layout Components */
        .folder-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .folder-card {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .folder-card:hover {
            border-color: #C0C8CC;
            box-shadow: 0 4px 15px rgba(27, 49, 57, 0.04);
            transform: translateX(4px);
        }

        .folder-info { display: flex; align-items: center; gap: 1rem; }
        .folder-icon { font-size: 1.5rem; }
        .folder-name { font-size: 1.05rem; font-weight: 700; color: var(--db-canvas); }
        .explore-badge {
            font-size: 0.75rem;
            background-color: #F1EFEA;
            color: var(--db-canvas);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-weight: 700;
        }

        .folder-card:hover .explore-badge { background-color: var(--db-lava); color: white; }

        /* Document View Render Box */
        .file-panel {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 14px;
            overflow: hidden;
        }

        .file-list { list-style: none; }
        .file-item {
            border-bottom: 1px solid #F5F4F0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.5rem;
        }

        .file-item:last-child { border-bottom: none; }
        .file-left-group { display: flex; align-items: center; gap: 0.75rem; }
        .file-title-text { font-weight: 600; font-size: 0.98rem; color: var(--db-text-main); }

        /* Inside Markdown Content Typography */
        .markdown-body {
            padding: 2.5rem;
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 14px;
            color: var(--db-text-main);
        }

        .markdown-body h1 { font-size: 1.75rem; border-bottom: 1px solid var(--db-oat-medium); padding-bottom: 0.5rem; margin-bottom: 1rem; color: var(--db-canvas); }

            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.88rem;
            border: 1px solid var(--db-border);
        }
    </style>

        }

        function loadFolderView(folderName) {
            document.getElementById("nav-root").classList.remove("active");
            const files = repositoryData[folderName];
            
            let html = `
                <div class="section-header">
                    <h2 class="section-title">${folderName}</h2>
                    <button class="back-btn" onclick="loadHomeView()">← Back to Home</button>
                </div>
                <div class="file-panel">
                    <ul class="file-list">
            `;
            
            if (files && files.length > 0) {
                files.forEach((file, index) => {
                    html += `
                        <li class="file-item">
                            <div class="file-left-group">
                                <span>📝</span>
                                <span class="file-title-text">${file.name}</span>
                            </div>
                            <button class="open-file-btn" onclick="loadMarkdownView('${folderName}', ${index})">Open Now</button>
                        </li>
                    `;
                });
            } else {
                html += `<li class="file-item" style="color: var(--db-text-muted);">No trace sheets compiled inside this directory yet.</li>`;
            }
            
            html += `</ul></div>`;
            workspace.innerHTML = html;
        }

        function loadMarkdownView(folderName, fileIndex) {
            const file = repositoryData[folderName][fileIndex];
            
            workspace.innerHTML = `
                <div class="section-header">
                    <h2 class="section-title">${file.name}</h2>
                    <div class="nav-actions-group">
                        <button class="back-btn" onclick="loadFolderView('${folderName}')">← Back to Folder</button>
                        <button class="back-btn" onclick="loadHomeView()">🏢 Main Home</button>
                    </div>
                </div>
                <div class="markdown-body" id="markdown-container"></div>
            `;

            // Renders completely offline without hitting network blocks
            document.getElementById("markdown-container").innerHTML = marked.parse(file.content);
        }

        window.onload = loadHomeView;
    </script>
</body>
</html>
