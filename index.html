<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity Engineering Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* Databricks Core Design System Tokens */
        :root {
            --db-canvas: #1B3139;      /* Deep dark slate navy */
            --db-lava: #FF3621;        /* Vibrant brand orange accent */
            --db-oat-light: #F9F7F4;   /* Soft premium background */
            --db-oat-medium: #EEEDE9;  /* Section dividers */
            --db-card: #FFFFFF;        /* Surface white */
            --db-border: #DCE0E2;      /* Light technical borders */
            --db-text-main: #303F47;   /* Readable dark body text */
            --db-text-muted: #5A6F77;  /* Balanced gray metadata */
            --db-accent-pink: #FF9E94; /* Light coral complement */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--db-oat-light);
            color: var(--db-text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Fixed Navigation Banner */
        header {
            background-color: var(--db-canvas);
            color: #FFFFFF;
            border-bottom: 4px solid var(--db-lava);
            padding: 1.25rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-tag {
            background-color: var(--db-lava);
            color: #FFFFFF;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .brand-name {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand-name span {
            color: var(--db-accent-pink);
        }

        /* Grid Layout: Sidebar Left, Content Right */
        .main-wrapper {
            max-width: 1200px;
            width: 100%;
            margin: 3rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 3rem;
        }

        @media (max-width: 900px) {
            .main-wrapper {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        /* LEFT SIDE: Navigation Directory Component */
        aside {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .directory-card {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 4px 12px rgba(27, 49, 57, 0.02);
        }

        .directory-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--db-text-muted);
            margin-bottom: 1rem;
            font-weight: 700;
            border-bottom: 2px solid var(--db-oat-medium);
            padding-bottom: 0.5rem;
        }

        .directory-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .directory-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--db-canvas);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .directory-link:hover, .directory-link.active {
            background-color: var(--db-oat-medium);
            color: var(--db-lava);
        }

        .terminal-panel {
            background-color: var(--db-canvas);
            border: 1px solid #2C434C;
            border-radius: 12px;
            color: #E6EEF0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 1.25rem;
        }

        .terminal-cmd {
            color: var(--db-accent-pink);
        }

        /* RIGHT SIDE: Workspace Design Viewports */
        .content-workspace {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .welcome-lead {
            font-size: 1.05rem;
            color: var(--db-text-muted);
            line-height: 1.5;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--db-border);
            padding-bottom: 1rem;
            margin-bottom: 0.5rem;
            gap: 1rem;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--db-canvas);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1.4rem;
            background-color: var(--db-lava);
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* Action Buttons */
        .nav-actions-group {
            display: flex;
            gap: 0.5rem;
        }

        .back-btn {
            background-color: var(--db-canvas);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .back-btn:hover {
            background-color: var(--db-lava);
        }

        .open-file-btn {
            background-color: var(--db-lava);
            color: #FFFFFF;
            border: none;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .open-file-btn:hover {
            background-color: var(--db-canvas);
        }

        /* Folder Grid Architecture */
        .folder-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .folder-card {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .folder-card:hover {
            border-color: #C0C8CC;
            box-shadow: 0 4px 15px rgba(27, 49, 57, 0.04);
            transform: translateX(4px);
        }

        .folder-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .folder-icon {
            font-size: 1.5rem;
        }

        .folder-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--db-canvas);
        }

        .explore-badge {
            font-size: 0.75rem;
            background-color: #F1EFEA;
            color: var(--db-canvas);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .folder-card:hover .explore-badge {
            background-color: var(--db-lava);
            color: white;
        }

        /* Files List and Native Markdown Workspace Canvas */
        .file-panel {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(27, 49, 57, 0.02);
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            border-bottom: 1px solid #F5F4F0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.5rem;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-left-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .file-title-text {
            font-weight: 600;
            font-size: 0.98rem;
            color: var(--db-text-main);
        }

        /* Markdown Document Native Render Styling Container */
        .markdown-body {
            padding: 2.5rem;
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 14px;
            color: var(--db-text-main);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--db-canvas);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .markdown-body h1 { font-size: 1.8rem; border-bottom: 1px solid var(--db-oat-medium); padding-bottom: 0.5rem; }
        .markdown-body h2 { font-size: 1.4rem; }
        
        .markdown-body p {
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--db-oat-light);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.88rem;
            border: 1px solid var(--db-border);
        }

        .markdown-body pre {
            background-color: var(--db-canvas);
            color: #E6EEF0;
            padding: 1.25rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            border: none;
            color: inherit;
        }

        /* Footer Element */
        footer {
            background-color: var(--db-canvas);
            color: #90A5B1;
            font-size: 0.8rem;
            padding: 2rem;
            border-top: 1px solid #2C434C;
            margin-top: auto;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="brand-section">
                <span class="brand-tag">PORTFOLIO</span>
                <div class="brand-name">pmoksana // <span>Cybersecurity</span></div>
            </div>
        </div>
    </header>

    <div class="main-wrapper">
        
        <aside>
            <div class="directory-card">
                <div class="directory-title">Navigation Directory</div>
                <ul class="directory-menu">
                    <li id="nav-root" class="directory-link active" onclick="loadHomeView()">📁 Root Workspace</li>
                </ul>
            </div>
            
            <div class="terminal-panel">
                <span class="terminal-cmd">$ ./deploy.sh</span><br>
                🚀 Core Engine Online...<br>
                ✅ Native MD Parser active.<br>
                🎉 Handshake verified.
            </div>
        </aside>

        <main class="content-workspace" id="workspace-view">
            </main>
    </div>

    <footer>
        <div class="footer-container">
            <div>&copy; 2026 pmoksana. Engineered with Databricks interface profiles.</div>
            <div style="font-weight: 700; color: #FFF;">SECURE PIPELINE STATIC</div>
        </div>
    </footer>

    <script>
        // Data Manifest matching case repository folder contents
        const repositoryData = {
            "Cyber Threat Management": [
                { name: "Incident Response and Threat Management Analysis.md" }
            ],
            "Endpoint Security": [
                { name: "Host Security and Baseline Protection Standards.md" }
            ],
            "Network Defense": [
                { name: "1_3_5_Lab_Document_Enterprise_Cybersecurity_Issues.md" }
            ],
            "Network Addressing and Basic": [
                { name: "IPv4 and Subnet Mask Architecture Configuration.md" }
            ],
            "Network Support and Security": [
                { name: "Firewall Access Lists and Control Log Policies.md" }
            ],
            "Networking Basics": [
                { name: "OSI Model Encapsulation and Data Link Layer Sync.md" }
            ],
            "Networking Devices and Initial Configuration": [
                { name: "Switch and Cisco Router Access Authentication Profile.md" }
            ],
            "Network Addressing and Basic Troubleshooting": [
                { name: "ICMP Diagnostics and Interface Trace Logging.md" }
            ]
        };

        const workspace = document.getElementById("workspace-view");

        // View A: Main Dashboard View
        function loadHomeView() {
            document.getElementById("nav-root").classList.add("active");
            
            let html = `
                <div>
                    <div class="section-header">
                        <h2 class="section-title">Cybersecurity and Networking Cases</h2>
                    </div>
                    <p class="welcome-lead">Welcome to my professional engineering log tracking core vulnerabilities, network infrastructure design controls, and architectural threat mapping profiles.</p>
                </div>
                <div class="folder-grid">
            `;
            
            Object.keys(repositoryData).forEach(folder => {
                html += `
                    <div class="folder-card" onclick="loadFolderView('${folder}')">
                        <div class="folder-info">
                            <span class="folder-icon">📁</span>
                            <span class="folder-name">${folder}</span>
                        </div>
                        <span class="explore-badge">EXPLORE ↗</span>
                    </div>
                `;
            });
            
            html += `</div>`;
            workspace.innerHTML = html;
        }

        // View B: Custom Inside Page for Folders
        function loadFolderView(folderName) {
            document.getElementById("nav-root").classList.remove("active");
            const files = repositoryData[folderName];
            
            let html = `
                <div class="section-header">
                    <h2 class="section-title">${folderName}</h2>
                    <button class="back-btn" onclick="loadHomeView()">← Back to Home</button>
                </div>
                <div class="file-panel">
                    <ul class="file-list">
            `;
            
            if (files && files.length > 0) {
                files.forEach(file => {
                    html += `
                        <li class="file-item">
                            <div class="file-left-group">
                                <span>📝</span>
                                <span class="file-title-text">${file.name}</span>
                            </div>
                            <button class="open-file-btn" onclick="loadMarkdownView('${folderName}', '${file.name}')">Open Now</button>
                        </li>
                    `;
                });
            } else {
                html += `<li class="file-item" style="color: var(--db-text-muted);">No trace sheets compiled inside this directory yet.</li>`;
            }
            
            html += `</ul></div>`;
            workspace.innerHTML = html;
        }

        // View C: Native Case Document Reader (Fetches text from source repository and applies styling canvas)
        function loadMarkdownView(folderName, fileName) {
            // Target the raw GitHub repository file url securely
            const rawUrl = `https://raw.githubusercontent.com/pmoksana/Cybersecurity/main/${encodeURIComponent(folderName)}/${encodeURIComponent(fileName)}`;
            
            workspace.innerHTML = `
                <div class="section-header">
                    <h2 class="section-title">${fileName}</h2>
                    <div class="nav-actions-group">
                        <button class="back-btn" onclick="loadFolderView('${folderName}')">← Back to Folder</button>
                        <button class="back-btn" onclick="loadHomeView()">🏢 Main Home</button>
                    </div>
                </div>
                <div class="markdown-body" id="markdown-container">
                    <p style="color: var(--db-text-muted); font-family: 'JetBrains Mono', monospace;">🔄 Establishing background network handshake stream for raw documentation source...</p>
                </div>
            `;

            // Stream document source string directly via native AJAX Fetch request
            fetch(rawUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Target sheet could not be reached via standard HTTP handshake.");
                    return response.text();
                })
                .then(markdownText => {
                    document.getElementById("markdown-container").innerHTML = marked.parse(markdownText);
                })
                .catch(err => {
                    document.getElementById("markdown-container").innerHTML = `
                        <div style="color: var(--db-lava); font-family: 'JetBrains Mono', monospace; padding: 1rem;">
                            ⚠️ <strong>Fetch Collision:</strong> ${err.message}<br><br>
                            <em>Note: Ensure file path strings correspond precisely with your upstream branch files.</em>
                        </div>
                    `;
                });
        }

        // Auto Boot Entry Point
        window.onload = loadHomeView;
    </script>
</body>
</html>
