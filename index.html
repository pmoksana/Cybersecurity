<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity Engineering Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Databricks Core Design System Tokens */
        :root {
            --db-canvas: #1B3139;      /* Deep dark slate navy */
            --db-lava: #FF3621;        /* Vibrant brand orange accent */
            --db-oat-light: #F9F7F4;   /* Soft premium background */
            --db-oat-medium: #EEEDE9;  /* Section dividers */
            --db-card: #FFFFFF;        /* Surface white */
            --db-border: #DCE0E2;      /* Light technical borders */
            --db-text-main: #303F47;   /* Readable dark body text */
            --db-text-muted: #5A6F77;  /* Balanced gray metadata */
            --db-accent-pink: #FF9E94; /* Light coral complement */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--db-oat-light);
            color: var(--db-text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Fixed Navigation Banner */
        header {
            background-color: var(--db-canvas);
            color: #FFFFFF;
            border-bottom: 4px solid var(--db-lava);
            padding: 1.25rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-tag {
            background-color: var(--db-lava);
            color: #FFFFFF;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .brand-name {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand-name span {
            color: var(--db-accent-pink);
        }

        /* Grid Layout: Sidebar Left, Content Right */
        .main-wrapper {
            max-width: 1200px;
            width: 100%;
            margin: 3rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 3rem;
        }

        @media (max-width: 900px) {
            .main-wrapper {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        /* LEFT SIDE: Navigation Directory Component */
        aside {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .directory-card {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 4px 12px rgba(27, 49, 57, 0.02);
        }

        .directory-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--db-text-muted);
            margin-bottom: 1rem;
            font-weight: 700;
            border-bottom: 2px solid var(--db-oat-medium);
            padding-bottom: 0.5rem;
        }

        .directory-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .directory-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--db-canvas);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .directory-link:hover, .directory-link.active {
            background-color: var(--db-oat-medium);
            color: var(--db-lava);
        }

        .terminal-panel {
            background-color: var(--db-canvas);
            border: 1px solid #2C434C;
            border-radius: 12px;
            color: #E6EEF0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 1.25rem;
        }

        .terminal-cmd {
            color: var(--db-accent-pink);
        }

        /* RIGHT SIDE: Dynamic Workspace Viewports */
        .content-workspace {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--db-border);
            padding-bottom: 1rem;
            margin-bottom: 0.5rem;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--db-canvas);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1.4rem;
            background-color: var(--db-lava);
            border-radius: 2px;
        }

        /* Return Navigation Button Style */
        .back-btn {
            background-color: var(--db-canvas);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .back-btn:hover {
            background-color: var(--db-lava);
        }

        /* Folder Dynamic Card Matrix Grid */
        .folder-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .folder-card {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .folder-card:hover {
            border-color: #C0C8CC;
            box-shadow: 0 4px 15px rgba(27, 49, 57, 0.04);
            transform: translateX(4px);
        }

        .folder-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .folder-icon {
            font-size: 1.5rem;
        }

        .folder-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--db-canvas);
        }

        .explore-badge {
            font-size: 0.75rem;
            background-color: #F1EFEA;
            color: var(--db-canvas);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .folder-card:hover .explore-badge {
            background-color: var(--db-lava);
            color: white;
        }

        /* Deep-dive Inner Files List View */
        .file-panel {
            background-color: var(--db-card);
            border: 1px solid var(--db-border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(27, 49, 57, 0.02);
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            border-bottom: 1px solid #F5F4F0;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: var(--db-text-main);
            font-weight: 500;
            transition: background-color 0.15s ease;
        }

        .file-link:hover {
            background-color: #FAF9F6;
            color: var(--db-lava);
        }

        .meta-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--db-text-muted);
            background-color: var(--db-oat-light);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--db-border);
        }

        /* Footer Element */
        footer {
            background-color: var(--db-canvas);
            color: #90A5B1;
            font-size: 0.8rem;
            padding: 2rem;
            border-top: 1px solid #2C434C;
            margin-top: auto;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="brand-section">
                <span class="brand-tag">PORTFOLIO</span>
                <div class="brand-name">pmoksana // <span>Cybersecurity</span></div>
            </div>
        </div>
    </header>

    <div class="main-wrapper">
        
        <aside>
            <div class="directory-card">
                <div class="directory-title">Navigation Directory</div>
                <ul class="directory-menu">
                    <li id="nav-root" class="directory-link active" onclick="loadHomeView()">📁 Root Workspace</li>
                </ul>
            </div>
            
            <div class="terminal-panel">
                <span class="terminal-cmd">$ ./deploy.sh</span><br>
                🚀 Active Routing Active...<br>
                ✅ Design Tokens Bound.<br>
                🎉 System synchronized.
            </div>
        </aside>

        <main class="content-workspace" id="workspace-view">
            </main>
    </div>

    <footer>
        <div class="footer-container">
            <div>&copy; 2026 pmoksana. Engineered with Databricks interface profiles.</div>
            <div style="font-weight: 700; color: #FFF;">SECURE PIPELINE STATIC</div>
        </div>
    </footer>

    <script>
        // Data Manifest containing exact directories from image_de7a3c.png mapped with their targeted local .md structures
        const repositoryData = {
            "Cyber Threat Management": [
                { name: "Incident Response and Threat Management Analysis.md", type: "MARKDOWN" }
            ],
            "Endpoint Security": [
                { name: "Host Security and Baseline Protection Standards.md", type: "MARKDOWN" }
            ],
            "Network Defense": [
                { name: "1_3_5_Lab_Document_Enterprise_Cybersecurity_Issues.md", type: "MARKDOWN" }
            ],
            "Network Addressing and Basic": [
                { name: "IPv4 and Subnet Mask Architecture Configuration.md", type: "MARKDOWN" }
            ],
            "Network Support and Security": [
                { name: "Firewall Access Lists and Control Log Policies.md", type: "MARKDOWN" }
            ],
            "Networking Basics": [
                { name: "OSI Model Encapsulation and Data Link Layer Sync.md", type: "MARKDOWN" }
            ],
            "Networking Devices and Initial Configuration": [
                { name: "Switch and Cisco Router Access Authentication Profile.md", type: "MARKDOWN" }
            ],
            "Network Addressing and Basic Troubleshooting": [
                { name: "ICMP Diagnostics and Interface Trace Logging.md", type: "MARKDOWN" }
            ]
        };

        const workspace = document.getElementById("workspace-view");

        // View Generator A: Landing View (Lists all folders as crisp clickable buttons)
        function loadHomeView() {
            document.getElementById("nav-root").classList.add("active");
            
            let html = `
                <div class="section-header">
                    <h2 class="section-title">Root Directories</h2>
                </div>
                <div class="folder-grid">
            `;
            
            Object.keys(repositoryData).forEach(folder => {
                html += `
                    <div class="folder-card" onclick="loadFolderView('${folder}')">
                        <div class="folder-info">
                            <span class="folder-icon">📁</span>
                            <span class="folder-name">${folder}</span>
                        </div>
                        <span class="explore-badge">EXPLORE ↗</span>
                    </div>
                `;
            });
            
            html += `</div>`;
            workspace.innerHTML = html;
        }

        // View Generator B: Subpage View (Opened inside identical system canvas with Return Arrow)
        function loadFolderView(folderName) {
            document.getElementById("nav-root").classList.remove("active");
            const files = repositoryData[folderName];
            
            let html = `
                <div class="section-header">
                    <h2 class="section-title">${folderName}</h2>
                    <button class="back-btn" onclick="loadHomeView()">← Back to Home</button>
                </div>
                <div class="file-panel">
                    <ul class="file-list">
            `;
            
            if (files && files.length > 0) {
                files.forEach(file => {
                    // Encodes URI parameters so links do not break due to file white spacing
                    const secureUrl = `https://pmoksana.github.io/Cybersecurity/${encodeURIComponent(folderName)}/${encodeURIComponent(file.name)}`;
                    html += `
                        <li class="file-item">
                            <a href="${secureUrl}" target="_blank" class="file-link">
                                <span>📝 ${file.name}</span>
                                <span class="meta-tag">${file.type}</span>
                            </a>
                        </li>
                    `;
                });
            } else {
                html += `
                    <li class="file-item" style="padding: 1.5rem; text-align: center; color: var(--db-text-muted);">
                        No trace sheets compiled inside this directory yet.
                    </li>
                `;
            }
            
            html += `</ul></div>`;
            workspace.innerHTML = html;
        }

        // Auto Boot Entry Point
        window.onload = loadHomeView;
    </script>
</body>
</html>
